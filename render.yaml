services:

  # ==================== 后端 API 服务 ====================
  - type: web
    name: supermarket-api
    runtime: docker
    repo: https://github.com/weimei-1/supermarket-orders.git
    branch: master
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/auth/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://db4free.net:3306/supermarket_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: supermarket_user
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        generateValue: true

  # ==================== 前端静态站点 ====================
  - type: web
    runtime: static
    name: supermarket-frontend
    repo: https://github.com/weimei-1/supermarket-orders.git
    branch: master
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://supermarket-api.onrender.com
